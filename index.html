<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000028">
  <link rel="manifest" href="manifest.json">
  <title>Robostar Assembly | Siemens</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" id="main-css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="390" height="844"></canvas>
    <div id="loading-screen">
      <div class="loading-title">ROBOSTAR</div>
      <div class="loading-subtitle">ASSEMBLY</div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loading-bar"></div>
      </div>
      <div class="loading-text">INITIALIZING FACTORY...</div>
    </div>
  </div>
  <script>
    const v = Date.now();
    document.getElementById('main-css').href = 'css/style.css?v=' + v;

    const modules = [
      'audio', 'engine', 'input', 'level', 'main', 'player',
      'progress', 'sprites', 'states', 'ui'
    ];
    const imports = {};
    modules.forEach(m => {
      imports['./js/' + m + '.js'] = './js/' + m + '.js?v=' + v;
      imports['./' + m + '.js'] = './js/' + m + '.js?v=' + v;
    });
    const map = document.createElement('script');
    map.type = 'importmap';
    map.textContent = JSON.stringify({ imports });
    document.head.appendChild(map);

    const s = document.createElement('script');
    s.type = 'module';
    s.src = 'js/main.js?v=' + v;
    document.body.appendChild(s);
  </script>
</body>
</html>
